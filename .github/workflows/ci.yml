name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Ruff 检查
        run: ruff check .

      - name: Mypy 检查
        run: mypy src

      - name: 运行测试
        run: pytest

  build:
    runs-on: ubuntu-latest
    needs: lint-type-test
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装构建工具
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: 构建分发包
        run: python -m build

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dist-artifacts
          path: dist/


  windows-exe-smoke:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: 构建 exe 冒烟测试
        shell: pwsh
        run: |
          pyinstaller --onefile --name workflow-engine-cli main.py
          if (!(Test-Path dist/workflow-engine-cli.exe)) { throw "exe not generated" }
