name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  python-package:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: 运行质量检查
        run: |
          ruff check .
          mypy src
          pytest

      - name: 构建 Python 分发包
        run: python -m build

      - name: 生成 Python 包校验文件
        run: |
          cd dist
          sha256sum * > SHA256SUMS-python.txt

      - name: 上传 Python 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  windows-exe:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: 运行测试
        shell: pwsh
        run: |
          ruff check .
          mypy src
          pytest

      - name: 使用 PyInstaller 构建 exe
        shell: pwsh
        run: |
          pyinstaller --onefile --name workflow-engine-cli main.py

      - name: 整理 exe 发布目录
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item dist/workflow-engine-cli.exe release/
          Compress-Archive -Path release/workflow-engine-cli.exe -DestinationPath release/workflow-engine-cli-win-x64.zip -Force
          Get-FileHash release/workflow-engine-cli.exe -Algorithm SHA256 | ForEach-Object { "$($_.Hash) *workflow-engine-cli.exe" } | Set-Content release/SHA256SUMS-exe.txt

      - name: 上传 exe 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: release/*

  publish-release:
    runs-on: ubuntu-latest
    needs: [python-package, windows-exe]
    steps:
      - name: 下载 Python 构建产物
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: release-assets/python

      - name: 下载 exe 构建产物
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: release-assets/windows

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/python/*
            release-assets/windows/*
