name: Bug 反馈
description: 报告一个可复现的问题，帮助我们快速定位并修复
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的反馈。请尽量提供完整信息，以便更快定位问题。

  - type: input
    id: summary
    attributes:
      label: 问题概述
      description: 请用一句话描述问题
      placeholder: 例如：执行 main.py 后出现异常退出
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请按步骤描述如何触发问题
      placeholder: |
        1. 进入项目目录
        2. 执行 python3 main.py
        3. 观察报错信息
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期结果
      placeholder: 例如：程序正常输出 Hello, GitHub!
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际结果
      placeholder: 例如：程序报错并退出
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 请提供操作系统、Python 版本、运行方式等
      placeholder: |
        - OS:
        - Python:
        - 命令:
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 日志或截图
      description: 可粘贴报错日志或截图链接
      render: shell
    validations:
      required: false
