name: 功能建议
description: 提交一个新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议。请尽量说明使用场景和预期价值。

  - type: input
    id: summary
    attributes:
      label: 功能标题
      placeholder: 例如：增加命令行参数支持
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 当前问题
      description: 这个功能希望解决什么问题？
      placeholder: 例如：当前程序只能固定输出，无法自定义内容
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 请描述你希望的实现方式
      placeholder: 例如：支持通过命令行传入输出文本
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 是否考虑过其他方案？
      placeholder: 可选填写
    validations:
      required: false

  - type: textarea
    id: value
    attributes:
      label: 价值说明
      description: 该功能能带来什么收益？
      placeholder: 例如：更适合做演示和自动化测试
    validations:
      required: false
